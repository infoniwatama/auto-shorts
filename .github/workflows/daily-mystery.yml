name: Daily Mystery (夜の覗き窓)

on:
  schedule:
    # 毎日 JST 09:00（00:00 UTC）に生成、19:30 JST 公開予約
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      theme:
        description: 'テーマ直接指定（空欄=mystery_topic_picker.py で自動選定）'
        required: false
        default: ''
      privacy:
        description: '公開設定'
        required: true
        default: 'private'
        type: choice
        options:
          - private
          - unlisted
          - public
      publish_at_jst:
        description: '公開時刻 JST（HH:MM、空白なら即時公開）'
        required: false
        default: '21:00'

env:
  DEFAULT_PUBLISH_AT_JST: "21:00"

permissions:
  contents: write

# Mysteryチャンネルは別concurrencyグループ（newsと並列OK）
concurrency:
  group: daily-mystery-generation
  cancel-in-progress: false

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 300    # 長尺(8-15分動画)生成に余裕

    services:
      voicevox:
        image: voicevox/voicevox_engine:cpu-ubuntu22.04-latest
        ports:
          - 50021:50021

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ffmpeg + system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Wait for VOICEVOX engine ready
        run: |
          for i in {1..60}; do
            if curl -fs http://localhost:50021/version > /dev/null; then
              echo "VOICEVOX ready"
              break
            fi
            echo "Waiting VOICEVOX... ($i/60)"
            sleep 5
          done
          curl -fs http://localhost:50021/version

      - name: Write secrets to .env and credential files
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          YT_CLIENT_SECRET: ${{ secrets.YOUTUBE_MYSTERY_CLIENT_SECRET_JSON }}
          YT_TOKEN: ${{ secrets.YOUTUBE_MYSTERY_TOKEN_JSON }}
        run: |
          cat > .env <<EOF
          ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY
          REPLICATE_API_TOKEN=$REPLICATE_API_TOKEN
          PEXELS_API_KEY=$PEXELS_API_KEY
          UNSPLASH_ACCESS_KEY=$UNSPLASH_ACCESS_KEY
          VOICEVOX_HOST=http://localhost:50021
          EOF
          # Mystery専用の認証情報を配置
          printf '%s' "$YT_CLIENT_SECRET" > client_secret.json
          printf '%s' "$YT_TOKEN" > token.json

      - name: Determine theme
        id: theme
        env:
          MANUAL_THEME: ${{ github.event.inputs.theme }}
        run: |
          if [ -n "$MANUAL_THEME" ]; then
            echo "Manual theme provided"
            echo "value<<__EOF__" >> "$GITHUB_OUTPUT"
            echo "$MANUAL_THEME" >> "$GITHUB_OUTPUT"
            echo "__EOF__" >> "$GITHUB_OUTPUT"
          else
            echo "Auto-pick from mystery_topics.json"
            python mystery_topic_picker.py > /tmp/picked.json
            cat /tmp/picked.json
            T=$(python -c "import json,sys; d=json.load(open('/tmp/picked.json',encoding='utf-8')); print(d['theme_for_video'])")
            echo "value<<__EOF__" >> "$GITHUB_OUTPUT"
            echo "$T" >> "$GITHUB_OUTPUT"
            echo "__EOF__" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate video
        run: |
          python main.py --genre mystery "${{ steps.theme.outputs.value }}"

      - name: Find latest run directory
        id: rundir
        run: |
          LATEST=$(ls -td output/videos/*/ 2>/dev/null | head -1)
          echo "Latest run dir: $LATEST"
          echo "path=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Determine privacy
        id: privacy
        run: |
          P='${{ github.event.inputs.privacy }}'
          if [ -z "$P" ]; then P=private; fi
          echo "value=$P" >> "$GITHUB_OUTPUT"

      - name: Compute schedule timestamp
        id: schedule
        run: |
          PUB='${{ github.event.inputs.publish_at_jst }}'
          if [ -z "$PUB" ]; then PUB="$DEFAULT_PUBLISH_AT_JST"; fi
          if [ -z "$PUB" ]; then
            echo "value=" >> "$GITHUB_OUTPUT"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "（即時公開）"
            exit 0
          fi
          NOW_JST=$(TZ=Asia/Tokyo date +%s)
          TARGET_JST=$(TZ=Asia/Tokyo date -d "today $PUB" +%s 2>/dev/null \
                       || TZ=Asia/Tokyo date -d "$PUB" +%s)
          if [ "$TARGET_JST" -le "$NOW_JST" ]; then
            TARGET_JST=$(TZ=Asia/Tokyo date -d "tomorrow $PUB" +%s)
          fi
          ISO=$(TZ=Asia/Tokyo date -d "@$TARGET_JST" --rfc-3339=seconds | sed 's/ /T/')
          echo "value=$ISO" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "予約公開: $ISO"

      - name: Upload to YouTube
        run: |
          if [ "${{ steps.schedule.outputs.skip }}" = "true" ]; then
            python youtube_upload.py "${{ steps.rundir.outputs.path }}" \
              --privacy "${{ steps.privacy.outputs.value }}"
          else
            python youtube_upload.py "${{ steps.rundir.outputs.path }}" \
              --privacy private \
              --schedule "${{ steps.schedule.outputs.value }}"
          fi

      - name: Save outputs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mystery-${{ github.run_id }}
          path: ${{ steps.rundir.outputs.path }}
          retention-days: 7

      - name: Commit mystery_history.json back to repo
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          if git diff --quiet mystery_history.json; then
            echo "No changes to history"
          else
            git add mystery_history.json
            git commit -m "chore: update mystery_history (run ${{ github.run_id }})"
            git push
          fi
