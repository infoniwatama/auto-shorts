name: Daily AI Flash News

on:
  # 1日5回生成＆公開（JST基準 / UTCで記述）
  # 生成開始時刻 → 公開予約（ピーク時刻）
  # 06:30→07:00（朝の通勤・朝活）
  # 11:30→12:00（昼休み）
  # 16:30→17:00（夕方・下校）
  # 19:00→19:30（ゴールデンタイム）
  # 21:30→22:00（夜ピーク）
  schedule:
    - cron: "30 21 * * *"   # 06:30 JST
    - cron: "30 2 * * *"    # 11:30 JST
    - cron: "30 7 * * *"    # 16:30 JST
    - cron: "0 10 * * *"    # 19:00 JST
    - cron: "30 12 * * *"   # 21:30 JST
  # 手動トリガー（テーマを直接指定可能）
  workflow_dispatch:
    inputs:
      theme:
        description: 'テーマを直接指定（空欄の場合は news_fetcher で自動選定）'
        required: false
        default: ''
      privacy:
        description: '公開設定（schedule 指定時は private 必須）'
        required: true
        default: 'private'
        type: choice
        options:
          - private
          - unlisted
          - public
      publish_at_jst:
        description: '公開時刻 JST（HH:MM、空白 or "auto" で現在時刻+30分）。例: 19:30'
        required: false
        default: 'auto'

env:
  # cron 実行時はデフォルト "auto"（現在JST時刻+30分で公開予約）
  DEFAULT_PUBLISH_AT_JST: "auto"

permissions:
  contents: write   # posted_history.json を push し直すため

# 同時実行を1本に制限し、複数トリガーされた場合は順次実行（重複ネタ回避のため）
concurrency:
  group: daily-news-generation
  cancel-in-progress: false

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      voicevox:
        image: voicevox/voicevox_engine:cpu-ubuntu22.04-latest
        ports:
          - 50021:50021

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install ffmpeg + system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-noto-cjk

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Wait for VOICEVOX engine ready
        run: |
          for i in {1..90}; do
            if curl -sf http://localhost:50021/version >/dev/null 2>&1; then
              echo "VOICEVOX ready (version: $(curl -s http://localhost:50021/version))"
              exit 0
            fi
            sleep 4
          done
          echo "VOICEVOX did not become ready in time"; exit 1

      - name: Write secrets to .env and credential files
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          YOUTUBE_CLIENT_SECRET_JSON: ${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: |
          cat > .env <<EOF
          ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY
          REPLICATE_API_TOKEN=$REPLICATE_API_TOKEN
          PEXELS_API_KEY=$PEXELS_API_KEY
          UNSPLASH_ACCESS_KEY=$UNSPLASH_ACCESS_KEY
          EOF
          printf '%s' "$YOUTUBE_CLIENT_SECRET_JSON" > client_secret.json
          printf '%s' "$YOUTUBE_TOKEN_JSON" > token.json

      - name: Determine theme
        id: theme
        run: |
          MANUAL_THEME='${{ github.event.inputs.theme }}'
          if [ -n "$MANUAL_THEME" ]; then
            echo "Manual theme provided"
            echo "value<<__EOF__" >> "$GITHUB_OUTPUT"
            echo "$MANUAL_THEME" >> "$GITHUB_OUTPUT"
            echo "__EOF__" >> "$GITHUB_OUTPUT"
          else
            echo "Auto-fetching top news..."
            THEME=$(python news_fetcher.py --json \
              | python -c "import json,sys; d=json.load(sys.stdin); print(d['selected'][0]['theme_for_video'])")
            echo "value<<__EOF__" >> "$GITHUB_OUTPUT"
            echo "$THEME" >> "$GITHUB_OUTPUT"
            echo "__EOF__" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate video
        run: |
          python main.py --genre ai_news "${{ steps.theme.outputs.value }}"

      - name: Find latest run directory
        id: rundir
        run: |
          RUN_DIR=$(ls -1tdr output/videos/*/ | tail -1)
          echo "path=$RUN_DIR" >> "$GITHUB_OUTPUT"
          echo "Latest run: $RUN_DIR"

      - name: Determine privacy
        id: privacy
        run: |
          P='${{ github.event.inputs.privacy }}'
          if [ -z "$P" ]; then P=private; fi
          echo "value=$P" >> "$GITHUB_OUTPUT"

      - name: Compute schedule timestamp
        id: schedule
        run: |
          # 公開時刻取得（手動 input → cron時のデフォルト の順）
          PUB='${{ github.event.inputs.publish_at_jst }}'
          if [ -z "$PUB" ]; then PUB="$DEFAULT_PUBLISH_AT_JST"; fi
          if [ -z "$PUB" ]; then
            echo "value=" >> "$GITHUB_OUTPUT"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "（即時公開）"
            exit 0
          fi
          NOW_JST=$(TZ=Asia/Tokyo date +%s)
          # "auto" なら現在JST時刻 + 30分後
          if [ "$PUB" = "auto" ]; then
            TARGET_JST=$((NOW_JST + 1800))
          else
            TARGET_JST=$(TZ=Asia/Tokyo date -d "today $PUB" +%s 2>/dev/null \
                         || TZ=Asia/Tokyo date -d "$PUB" +%s)
            if [ "$TARGET_JST" -le "$NOW_JST" ]; then
              TARGET_JST=$(TZ=Asia/Tokyo date -d "tomorrow $PUB" +%s)
            fi
          fi
          # RFC3339 (+09:00) で出力
          ISO=$(TZ=Asia/Tokyo date -d "@$TARGET_JST" --rfc-3339=seconds | sed 's/ /T/')
          echo "value=$ISO" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "予約公開: $ISO"

      - name: Upload to YouTube
        run: |
          if [ "${{ steps.schedule.outputs.skip }}" = "true" ]; then
            python youtube_upload.py "${{ steps.rundir.outputs.path }}" \
              --privacy "${{ steps.privacy.outputs.value }}"
          else
            # スケジュール指定時は privacy を private に強制（YouTubeの仕様）
            python youtube_upload.py "${{ steps.rundir.outputs.path }}" \
              --privacy private \
              --schedule "${{ steps.schedule.outputs.value }}"
          fi

      - name: Save outputs as artifact (debug用)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: video-${{ github.run_id }}
          path: |
            ${{ steps.rundir.outputs.path }}
          retention-days: 7

      - name: Commit posted_history.json back to repo
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet posted_history.json; then
            echo "No changes to history"
          else
            git add posted_history.json
            git commit -m "chore: update posted_history (run ${{ github.run_id }})"
            git push
          fi